<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Commercial Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6fa;
padding:40px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.value{
font-size:32px;
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<h1>商用專案 Dashboard</h1>

<div class="grid">

<div class="card">
客服工單
<div class="value">132</div>
</div>

<div class="card">
系統事件
<div class="value">47</div>
</div>

<div class="card">
專案數量
<div class="value">8</div>
</div>

</div>

</body>
</html>
