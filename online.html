<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Online Game Dashboard</title>

<style>

body{
font-family:Arial;
background:#f4f6fa;
padding:40px;
}

h1{
margin-bottom:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.value{
font-size:32px;
font-weight:bold;
margin-top:10px;
}

</style>

</head>

<body>

<h1>線上遊戲專案 Dashboard</h1>

<div class="grid">

<div class="card">
問題回報
<div class="value">472</div>
</div>

<div class="card">
電話進線
<div class="value">88</div>
</div>

<div class="card">
信箱回報
<div class="value">285</div>
</div>

</div>

</body>
</html>
